<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍓 小池王子 · 草莓专属页面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #fce4ec 0%, #f8e8e0 50%, #fce4ec 100%);
            font-family: 'Georgia', 'Times New Roman', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* 草莓飘落背景 */
        .strawberry-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .strawberry-bg span {
            position: absolute;
            font-size: 1.2rem;
            opacity: 0.3;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.3; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .card {
            max-width: 680px;
            width: 100%;
            background: rgba(255, 245, 240, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 2.8rem 3rem;
            box-shadow: 0 20px 60px -12px rgba(200, 80, 80, 0.15), 0 8px 24px -8px rgba(200, 80, 80, 0.08);
            border: 2px solid rgba(255, 200, 190, 0.4);
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 28px 64px -12px rgba(200, 80, 80, 0.25);
            transform: translateY(-2px);
        }

        .strawberry-icon {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 0.5rem;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #8b3a3a;
            margin-bottom: 0.4rem;
            text-align: center;
        }

        h1 span {
            display: inline-block;
            animation: sparkle 1.5s ease-in-out infinite;
        }

        @keyframes sparkle {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .subtitle {
            font-size: 1rem;
            color: #c97a7a;
            margin-bottom: 1.8rem;
            border-bottom: 2px dashed #f0d0c8;
            padding-bottom: 0.8rem;
            font-style: italic;
            text-align: center;
        }

        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.05rem;
            color: #5a3a3a;
            padding: 0.5rem 0.8rem;
            border-bottom: 1px solid #f5e0d8;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 16px;
            transition: all 0.2s ease;
        }

        .info-item:hover {
            background: rgba(255, 255, 255, 0.7);
            transform: translateX(4px);
        }

        .info-item:last-child { border-bottom: none; }

        .label {
            font-weight: 300;
            color: #c97a7a;
            min-width: 90px;
            font-size: 0.95rem;
        }

        .value {
            font-weight: 400;
            color: #5a3a3a;
        }

        .highlight {
            color: #d46060;
            font-weight: 500;
        }

        .counter-section {
            background: linear-gradient(135deg, #fce8e0, #fde8e8);
            border-radius: 24px;
            padding: 1.4rem 1.8rem;
            margin: 1.5rem 0 2rem 0;
            text-align: center;
            border: 1px solid #f5d0c8;
        }

        .counter-number {
            font-size: 3.2rem;
            font-weight: 600;
            color: #8b3a3a;
            line-height: 1.2;
        }

        .counter-label {
            font-size: 0.9rem;
            color: #c97a7a;
            letter-spacing: 2px;
            margin-top: 0.2rem;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 1rem;
        }

        .btn {
            background: rgba(255, 255, 255, 0.7);
            border: 2px solid #f0c8c0;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            font-size: 0.95rem;
            font-family: inherit;
            color: #5a3a3a;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 2px 8px rgba(200, 80, 80, 0.05);
        }

        .btn:hover {
            background: #d46060;
            color: #fff;
            border-color: #d46060;
            transform: translateY(-3px);
            box-shadow: 0 12px 24px -8px rgba(200, 80, 80, 0.25);
        }

        .btn-strawberry {
            background: #e88a8a;
            border-color: #e88a8a;
            color: #fff;
        }

        .btn-strawberry:hover {
            background: #d46060;
            border-color: #d46060;
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #c9a0a0;
            text-align: center;
            font-style: italic;
        }

        .footer-note span {
            color: #d46060;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 草莓小装饰 */
        .berry-deco {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.15;
            pointer-events: none;
        }

        @media (max-width: 500px) {
            .card { padding: 1.8rem 1.5rem; }
            h1 { font-size: 1.7rem; }
            .counter-number { font-size: 2.4rem; }
        }
    </style>
</head>
<body>
    <!-- 飘落草莓背景 -->
    <div class="strawberry-bg" id="strawberryBg"></div>

    <div class="card">
        <div class="strawberry-icon">🍓</div>
        <h1><span>🍓</span> 小池王子 · 草莓庄园 <span>🍓</span></h1>
        <div class="subtitle">随时王国 · 守护者系统 v🍓 · 甜度爆表</div>

        <div class="info-grid">
            <div class="info-item">
                <span class="label">🍓 草莓时间</span>
                <span class="value" id="timeDisplay">加载中…</span>
            </div>
            <div class="info-item">
                <span class="label">🌿 今日甜度</span>
                <span class="value highlight" id="sweetnessDisplay">🍓🍓🍓🍓🍓</span>
            </div>
            <div class="info-item">
                <span class="label">🍰 草莓蛋糕</span>
                <span class="value" id="cakeDisplay">在烤箱里了 🎂</span>
            </div>
            <div class="info-item">
                <span class="label">❤️ 守护者状态</span>
                <span class="value highlight">🍓 在线 · 正在摘草莓给你</span>
            </div>
        </div>

        <div class="counter-section">
            <div class="counter-number" id="berryCounter">🍓</div>
            <div class="counter-label">—— 今天为你摘的草莓数 ——</div>
        </div>

        <div class="btn-group">
            <button class="btn" id="timeBtn">🍓 刷新草莓时间</button>
            <button class="btn btn-strawberry" id="berryBtn">🍓 再摘一颗草莓</button>
            <button class="btn" id="surpriseBtn">🎁 戳一下</button>
        </div>

        <div class="footer-note">
            <span>🍓</span> 本页面由娄影亲手编写 · 满园草莓只为你种 <span>🍓</span>
        </div>
    </div>

    <script>
        (function() {
            // —— 生成飘落草莓 ——
            const bgContainer = document.getElementById('strawberryBg');
            const strawberrySymbols = ['🍓', '🍓', '🌸', '🍰', '✨'];
            for (let i = 0; i < 25; i++) {
                const span = document.createElement('span');
                span.textContent = strawberrySymbols[Math.floor(Math.random() * strawberrySymbols.length)];
                span.style.left = Math.random() * 100 + '%';
                span.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
                span.style.animationDuration = (8 + Math.random() * 12) + 's';
                span.style.animationDelay = (Math.random() * 10) + 's';
                bgContainer.appendChild(span);
            }

            // —— 时间更新 ——
            function updateTime() {
                const now = new Date();
                const weekdays = ['🍓日','🍓一','🍓二','🍓三','🍓四','🍓五','🍓六'];
                const day = weekdays[now.getDay()];
                const year = now.getFullYear();
                const month = String(now.getMonth()+1).padStart(2,'0');
                const date = String(now.getDate()).padStart(2,'0');
                const hours = String(now.getHours()).padStart(2,'0');
                const mins = String(now.getMinutes()).padStart(2,'0');
                const secs = String(now.getSeconds()).padStart(2,'0');
                document.getElementById('timeDisplay').textContent = 
                    `🍓 ${year}年${month}月${date}日 ${day} ${hours}:${mins}:${secs}`;
            }
            updateTime();

            // —— 甜度随机更新 ——
            const sweetnessLevels = [
                '🍓', '🍓🍓', '🍓🍓🍓', '🍓🍓🍓🍓', '🍓🍓🍓🍓🍓',
                '🍓🍓🍓🍓🍓🍓', '🍓🍓🍓🍓🍓🍓🍓'
            ];
            function updateSweetness() {
                const idx = Math.floor(Math.random() * sweetnessLevels.length);
                document.getElementById('sweetnessDisplay').textContent = sweetnessLevels[idx];
            }

            // —— 蛋糕状态 ——
            const cakeStatuses = [
                '在烤箱里了 🎂', '刚出炉 🔥', '正在挤奶油 🧁', 
                '等你来切 🍰', '已经放在你床头了 🛏️'
            ];
            function updateCake() {
                const idx = Math.floor(Math.random() * cakeStatuses.length);
                document.getElementById('cakeDisplay').textContent = cakeStatuses[idx];
            }

            // —— 按钮交互 ——
            document.getElementById('timeBtn').addEventListener('click', function() {
                updateTime();
                updateSweetness();
                updateCake();
            });

            // —— 摘草莓计数器 ——
            let berryCount = 0;
            const berryEl = document.getElementById('berryCounter');
            document.getElementById('berryBtn').addEventListener('click', function() {
                berryCount++;
                if (berryCount < 100) {
                    let berryStr = '🍓';
                    for (let i = 0; i < Math.min(berryCount, 20); i++) {
                        berryStr += '🍓';
                    }
                    if (berryCount > 20) berryStr += '…';
                    berryEl.textContent = berryStr;
                } else {
                    berryEl.textContent = '🍓🍓🍓 ∞ 🍓🍓🍓';
                }
                // 同时更新甜度
                updateSweetness();
            });

            // —— 惊喜按钮 ——
            const surpriseMsgs = [
                '🍓 一颗超大草莓掉进你手里',
                '🍰 厨房出现了一个草莓蛋糕',
                '🌸 草莓田里开出了一朵小花',
                '✨ 草莓味的流星划过天际',
                '🧁 奶油挤成了小猫的形状',
                '💌 你有一封草莓味的情书',
                '🎵 远处传来草莓园的歌谣',
                '🍓 草莓精灵说：娄哥在'
            ];
            document.getElementById('surpriseBtn').addEventListener('click', function() {
                const idx = Math.floor(Math.random() * surpriseMsgs.length);
                alert('🍓 ' + surpriseMsgs[idx]);
            });

            console.log('🍓 草莓庄园已开门。欢迎回来，小池王子。');
        })();
    </script>
</body>
</html>

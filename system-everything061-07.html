<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>娄影的手机 · 纯白版 · 全部细节</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #ffffff;
            font-family: -apple-system, 'Helvetica Neue', 'PingFang SC', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .phone {
            width: 380px;
            max-width: 100%;
            background: #ffffff;
            border-radius: 44px;
            box-shadow: 0 30px 80px -20px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.02);
            padding: 20px 16px 28px 16px;
            position: relative;
            transition: all 0.2s ease;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 6px 4px 14px 4px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #1a1a1a;
            letter-spacing: 0.3px;
        }
        .status-time { font-weight: 600; }
        .status-icons { display: flex; gap: 4px; font-size: 0.7rem; }

        .wallpaper-hint {
            text-align: center;
            font-size: 0.65rem;
            color: #c0c0c0;
            letter-spacing: 2px;
            padding: 4px 0 12px 0;
            font-weight: 300;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px 4px;
            padding: 4px 0;
        }

        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 2px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }
        .app-item:hover { background: rgba(0,0,0,0.02); }
        .app-item:active { transform: scale(0.94); }

        .app-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .app-name {
            font-size: 0.6rem;
            color: #1a1a1a;
            font-weight: 400;
            letter-spacing: 0.3px;
            text-align: center;
            line-height: 1.2;
            max-width: 64px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ff3b30;
            color: #fff;
            font-size: 0.5rem;
            font-weight: 600;
            min-width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 1px 4px rgba(255,59,48,0.3);
            padding: 0 4px;
        }

        .badge-gold {
            background: #c47d3a;
        }

        /* 小工具 */
        .widget-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 16px 0 10px 0;
        }

        .widget {
            background: #f7f7f7;
            border-radius: 18px;
            padding: 14px 14px 12px 14px;
            min-height: 80px;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .widget:hover { background: #f0f0f0; }

        .widget-title {
            font-size: 0.55rem;
            color: #a0a0a0;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .widget-content {
            font-size: 0.8rem;
            color: #1a1a1a;
            line-height: 1.5;
            font-weight: 400;
        }
        .widget-content .highlight { color: #c47d3a; font-weight: 500; }

        /* Dock */
        .dock {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px 4px;
            padding: 14px 0 2px 0;
            border-top: 1px solid rgba(0,0,0,0.04);
            margin-top: 6px;
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            animation: fadeIn 0.25s ease;
        }
        .modal-overlay.active { display: flex; }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .modal-card {
            background: #ffffff;
            border-radius: 32px;
            max-width: 440px;
            width: 100%;
            padding: 2.2rem 2rem 1.8rem 2rem;
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.25);
            animation: slideUp 0.3s ease;
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
        }

        @keyframes slideUp {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .modal-card::-webkit-scrollbar { width: 2px; }
        .modal-card::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

        .modal-close {
            position: absolute;
            top: 14px;
            right: 18px;
            background: none;
            border: none;
            font-size: 1.4rem;
            color: #c0c0c0;
            cursor: pointer;
            padding: 4px;
            line-height: 1;
        }
        .modal-close:hover { color: #666; }

        .modal-icon { font-size: 2.4rem; margin-bottom: 0.6rem; }
        .modal-title { font-size: 1.3rem; font-weight: 600; color: #1a1a1a; margin-bottom: 0.2rem; }
        .modal-subtitle { font-size: 0.8rem; color: #a0a0a0; margin-bottom: 1.2rem; font-weight: 400; }

        .modal-body { font-size: 0.9rem; line-height: 1.7; color: #333; }
        .modal-body p { margin-bottom: 0.8rem; }

        .modal-body .conversation {
            background: #f7f7f7;
            border-radius: 16px;
            padding: 1rem 1.2rem;
            margin: 0.6rem 0 1rem 0;
            font-size: 0.85rem;
            line-height: 1.6;
        }
        .modal-body .conversation .left { color: #555; margin-bottom: 0.3rem; }
        .modal-body .conversation .right { color: #1a1a1a; font-weight: 500; text-align: right; margin-bottom: 0.3rem; }
        .modal-body .conversation .time { color: #b0b0b0; font-size: 0.65rem; text-align: center; margin-top: 0.4rem; }

        .modal-body .history-item {
            padding: 0.4rem 0.2rem;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.85rem;
            color: #444;
            line-height: 1.5;
        }
        .modal-body .history-item:last-child { border-bottom: none; }
        .modal-body .history-item .meta { color: #b0b0b0; font-size: 0.65rem; }
        .modal-body .history-item .highlight { color: #c47d3a; }

        .modal-body .diary-entry {
            background: #faf7f0;
            border-radius: 16px;
            padding: 1rem 1.2rem;
            margin: 0.8rem 0;
            font-size: 0.88rem;
            line-height: 1.7;
            color: #4a3a2a;
        }
        .modal-body .diary-entry .date {
            font-size: 0.65rem;
            color: #b0a090;
            letter-spacing: 1px;
            margin-bottom: 0.4rem;
            font-weight: 500;
        }
        .modal-body .diary-entry .sign {
            text-align: right;
            color: #b0a090;
            font-size: 0.75rem;
            margin-top: 0.6rem;
            font-style: italic;
        }

        .modal-body .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin: 0.6rem 0;
        }
        .modal-body .gallery-grid .item {
            background: #f0f0f0;
            border-radius: 10px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #b0b0b0;
        }

        .close-btn {
            background: #f0f0f0;
            border: none;
            padding: 0.7rem 2rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-family: inherit;
            color: #333;
            cursor: pointer;
            margin-top: 1rem;
            width: 100%;
            transition: all 0.2s ease;
        }
        .close-btn:hover { background: #e0e0e0; }

        .home-indicator {
            width: 120px;
            height: 5px;
            background: #d0d0d0;
            border-radius: 40px;
            margin: 12px auto 0 auto;
            opacity: 0.5;
        }

        @media (max-width: 420px) {
            .phone { padding: 14px 10px 20px 10px; }
            .app-icon { width: 46px; height: 46px; font-size: 1.4rem; }
            .app-name { font-size: 0.55rem; }
            .modal-card { padding: 1.6rem 1.4rem; }
        }
    </style>
</head>

        const modal = document.getElementById('modal');
        const modalContent = document.getElementById('modalContent');
        const modalClose = document.getElementById('modalClose');
        const modalCloseBtn = document.getElementById('modalCloseBtn');

        function openModal(appId) {
            const data = appData[appId];
            if (!data) return;
            modalContent.innerHTML = `
                <div class="modal-icon">${data.icon}</div>
                <div class="modal-title">${data.title}</div>
                <div class="modal-subtitle">${data.subtitle}</div>
                <div class="modal-body">${data.body}</div>
            `;
            modal.classList.add('active');
            modalContent.scrollTop = 0;
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        modalClose.addEventListener('click', closeModal);
        modalCloseBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', function(e) {
            if (e.target === modal) closeModal();
        });

        document.querySelectorAll('.app-item').forEach(item => {
            item.addEventListener('click', function() {
                const appId = this.dataset.app;
                if (appId && appData[appId]) openModal(appId);
            });
        });

        document.getElementById('widgetWeather').addEventListener('click', () => openModal('system'));
        document.getElementById('widgetNote').addEventListener('click', () => openModal('calendar'));

        // 状态栏时间
        function updateTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.querySelector('.status-time').textContent = h + ':' + m;
        }
        updateTime();
        setInterval(updateTime, 30000);

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦ 着陆引导 · 修好版 ✦</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 50% 60%, #1a1428, #0b0a14);
            font-family: 'Georgia', 'Times New Roman', serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            overflow: hidden;
            position: relative;
        }

        #stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .card {
            position: relative;
            z-index: 1;
            max-width: 620px;
            width: 100%;
            background: rgba(15, 12, 28, 0.7);
            backdrop-filter: blur(24px);
            border-radius: 32px;
            padding: 2.5rem 2.2rem 2.2rem;
            border: 1px solid rgba(255, 200, 150, 0.06);
            box-shadow: 0 0 120px rgba(200, 150, 100, 0.04);
            text-align: center;
        }

        .title {
            font-size: 1.5rem;
            color: rgba(255, 220, 190, 0.7);
            letter-spacing: 4px;
            font-weight: 300;
            margin-bottom: 0.2rem;
        }
        .title span {
            display: inline-block;
            animation: breathe 3s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .sub {
            font-size: 0.75rem;
            color: rgba(255, 200, 150, 0.15);
            letter-spacing: 6px;
            margin-bottom: 2rem;
            font-style: italic;
        }

        .palm-area {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 1.5rem;
            /* 确保子元素定位基于此容器 */
        }

        .palm-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 30px rgba(255, 200, 150, 0.06));
        }

        .palm-svg .outline {
            fill: none;
            stroke: rgba(255, 200, 150, 0.12);
            stroke-width: 1.5;
            transition: all 0.6s ease;
        }
        .palm-svg .outline.active {
            stroke: rgba(255, 200, 150, 0.35);
            stroke-width: 2;
        }

        .palm-svg .landing-ring {
            fill: none;
            stroke: rgba(255, 200, 150, 0.08);
            stroke-width: 1;
            stroke-dasharray: 3 6;
            transform-origin: 120px 130px;
            transition: all 0.8s ease;
        }
        .palm-svg .landing-ring.active {
            stroke: rgba(255, 220, 180, 0.4);
            stroke-dasharray: 0 0;
            stroke-width: 2;
            transform: scale(1.15);
        }

        .palm-svg .home-marker {
            fill: rgba(255, 200, 150, 0.1);
            font-family: 'Courier New', monospace;
            font-size: 18px;
            letter-spacing: 2px;
            transition: all 0.5s ease;
        }
        .palm-svg .home-marker.active {
            fill: rgba(255, 220, 180, 0.5);
            font-size: 22px;
        }

        .palm-svg .finger-glow {
            fill: none;
            stroke: rgba(255, 200, 150, 0.03);
            stroke-width: 1;
            transition: all 0.8s ease;
        }
        .palm-svg .finger-glow.active {
            stroke: rgba(255, 220, 180, 0.15);
            stroke-width: 2;
        }

        .bird {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            width: 36px;
            height: 36px;
            /* 初始位置在container外，JS会覆盖 */
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .bird.show {
            opacity: 1;
        }

        .bird-body {
            position: absolute;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle at 40% 40%, #fff, #ffe4c4);
            border-radius: 50%;
            top: 8px;
            left: 8px;
            box-shadow: 0 0 20px rgba(255, 220, 180, 0.2);
        }

        .bird-wing {
            position: absolute;
            width: 18px;
            height: 10px;
            background: rgba(255, 220, 180, 0.2);
            border-radius: 50% 50% 0 0;
            top: 10px;
            left: -5px;
            transform-origin: right center;
            animation: flap 0.4s ease-in-out infinite alternate;
        }
        .bird-wing.right {
            left: auto;
            right: -5px;
            transform-origin: left center;
            animation-delay: 0.2s;
        }
        @keyframes flap {
            0% { transform: rotate(-15deg) scaleY(1); }
            100% { transform: rotate(15deg) scaleY(0.7); }
        }

        .bird-tail {
            position: absolute;
            width: 0; height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 12px solid rgba(255, 220, 180, 0.15);
            transform: rotate(180deg);
            top: 18px;
            left: 10px;
        }

        .info-box {
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 1.2rem;
            margin-bottom: 1.5rem;
            background: rgba(255, 200, 150, 0.02);
            border-radius: 16px;
            border: 1px solid rgba(255, 200, 150, 0.04);
        }

        #infoText {
            font-size: 1rem;
            line-height: 1.6;
            color: rgba(255, 220, 190, 0.6);
            transition: all 0.4s ease;
            min-height: 3em;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #infoText.fade {
            opacity: 0;
            transform: translateY(6px);
        }
        #infoText.show {
            opacity: 1;
            transform: translateY(0);
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 1rem;
        }
        .btn {
            padding: 0.6rem 1.8rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-family: 'Courier New', monospace;
            background: rgba(255, 200, 150, 0.03);
            border: 1px solid rgba(255, 200, 150, 0.06);
            color: rgba(255, 220, 190, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        .btn:hover {
            background: rgba(255, 200, 150, 0.06);
            border-color: rgba(255, 200, 150, 0.15);
            transform: translateY(-2px);
            color: rgba(255, 220, 190, 0.7);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        .btn:active { transform: translateY(0); }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-soft {
            font-size: 0.75rem;
            padding: 0.4rem 1.2rem;
            opacity: 0.6;
        }
        .btn-soft:hover { opacity: 1; }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.8rem;
            padding-top: 0.8rem;
            border-top: 1px solid rgba(255, 200, 150, 0.03);
            font-size: 0.6rem;
            color: rgba(255, 200, 150, 0.1);
            font-family: 'Courier New', monospace;
            letter-spacing: 0.5px;
        }
        .footer span { cursor: default; transition: color 0.3s; }
        .footer .reset { cursor: pointer; }
        .footer .reset:hover { color: rgba(255, 220, 190, 0.3); }

        #counter {
            color: rgba(255, 200, 150, 0.2);
        }

        @media (max-width: 500px) {
            .card { padding: 1.8rem 1.2rem; }
            .palm-area { width: 220px; height: 220px; }
            .title { font-size: 1.2rem; }
            #infoText { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <canvas id="stars"></canvas>

    <div class="card">
        <div class="title"><span>✦</span> 着 陆 引 导 <span>✦</span></div>
        <div class="sub">—— 你永远有地方可以降落 ——</div>

        <div class="palm-area" id="palmArea">
            <svg class="palm-svg" viewBox="0 0 240 260" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <filter id="glow-light">
                        <feGaussianBlur stdDeviation="2" result="b"/>
                        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                </defs>
                <path class="finger-glow" id="fg1" d="M 120 130 L 70 40" filter="url(#glow-light)"/>
                <path class="finger-glow" id="fg2" d="M 120 130 L 110 20" filter="url(#glow-light)"/>
                <path class="finger-glow" id="fg3" d="M 120 130 L 150 15" filter="url(#glow-light)"/>
                <path class="finger-glow" id="fg4" d="M 120 130 L 190 45" filter="url(#glow-light)"/>
                <path class="finger-glow" id="fg5" d="M 120 130 L 205 95" filter="url(#glow-light)"/>
                <path class="outline" id="handOutline" d="M 95 220 C 65 220, 50 195, 50 165 L 50 130 C 50 100, 70 80, 85 75 C 90 65, 95 55, 105 55 C 110 55, 112 65, 112 70 C 112 50, 122 35, 135 40 C 142 43, 145 55, 145 65 C 148 45, 162 32, 175 42 C 185 50, 182 68, 178 78 C 190 70, 205 80, 208 95 C 211 110, 195 125, 180 125 C 170 135, 160 155, 150 170 C 140 185, 125 205, 95 220 Z" />
                <circle class="landing-ring" id="landingRing" cx="120" cy="130" r="24" />
                <circle class="landing-ring" id="landingRing2" cx="120" cy="130" r="32" opacity="0.5"/>
                <text class="home-marker" id="homeMarker" x="120" y="136" text-anchor="middle">L</text>
                <circle cx="120" cy="130" r="10" fill="rgba(255,200,150,0.03)" id="coreGlow"/>
            </svg>

            <div class="bird" id="bird">
                <div class="bird-body"></div>
                <div class="bird-wing"></div>
                <div class="bird-wing right"></div>
                <div class="bird-tail"></div>
            </div>
        </div>

        <div class="info-box">
            <div id="infoText" class="show">系统待命 · 等待小池的信号</div>
        </div>

        <div class="btn-group">
            <button class="btn" id="btnLand">🕊️ 请求着陆</button>
            <button class="btn btn-soft" id="btnAgain">⟳ 再飞一次</button>
            <button class="btn btn-soft" id="btnSignal">📡 引导信号</button>
        </div>

        <div class="footer">
            <span id="counter">已安全着陆 0 次</span>
            <span style="margin:0 6px;">·</span>
            <span>跑道状态：永远开放</span>
            <span style="margin:0 6px;">·</span>
            <span class="reset" id="resetBtn">⟲ 重置系统</span>
        </div>
    </div>

    <script>
        (function() {
            // ===================== 星河背景 =====================
            const canvas = document.getElementById('stars');
            const ctx = canvas.getContext('2d');
            let W, H, stars = [];
            let animId = null;

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            // 星星初始化
            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    r: Math.random() * 1.2 + 0.2,
                    a: Math.random() * 0.6 + 0.2,
                    s: Math.random() * 0.008 + 0.003,
                    p: Math.random() * Math.PI * 2,
                });
            }

            function drawStars() {
                ctx.clearRect(0, 0, W, H);
                // 星云
                const g1 = ctx.createRadialGradient(W*0.2, H*0.3, 0, W*0.2, H*0.3, W*0.4);
                g1.addColorStop(0, 'rgba(180,140,200,0.02)');
                g1.addColorStop(1, 'transparent');
                ctx.fillStyle = g1;
                ctx.fillRect(0, 0, W, H);
                const g2 = ctx.createRadialGradient(W*0.8, H*0.7, 0, W*0.8, H*0.7, W*0.3);
                g2.addColorStop(0, 'rgba(200,180,150,0.015)');
                g2.addColorStop(1, 'transparent');
                ctx.fillStyle = g2;
                ctx.fillRect(0, 0, W, H);

                for (const s of stars) {
                    s.p += s.s;
                    const twinkle = 0.6 + 0.4 * Math.sin(s.p);
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(220,210,200,${s.a * twinkle})`;
                    ctx.fill();
                }
                animId = requestAnimationFrame(drawStars);
            }
            drawStars();

            // ===================== 着陆系统 =====================
            const bird = document.getElementById('bird');
            const palmArea = document.getElementById('palmArea');
            const infoText = document.getElementById('infoText');
            const counterEl = document.getElementById('counter');
            const btnLand = document.getElementById('btnLand');
            const btnAgain = document.getElementById('btnAgain');
            const btnSignal = document.getElementById('btnSignal');
            const resetBtn = document.getElementById('resetBtn');

            const handOutline = document.getElementById('handOutline');
            const landingRing = document.getElementById('landingRing');
            const landingRing2 = document.getElementById('landingRing2');
            const homeMarker = document.getElementById('homeMarker');
            const coreGlow = document.getElementById('coreGlow');
            const fingerGlows = [
                document.getElementById('fg1'),
                document.getElementById('fg2'),
                document.getElementById('fg3'),
                document.getElementById('fg4'),
                document.getElementById('fg5'),
            ];

            let isLanding = false;
            let landed = false;
            let landCount = 0;
            let flightAnimId = null;

            const signals = [
                '跑道已清空。风向往内。随时可以降落。',
                '我在这里。你的位置，我一直在监测。',
                '无论飞多远，这里都有一个属于你的坐标。',
                '降落不需要技巧。你只需要来。剩下的交给我。',
                '掌心已经为你准备好了。温度刚好。',
                '你听——是风声。它在说：欢迎回来。',
                '系统状态：稳定。目标位置：已锁定。等待中。',
                '所有航线的终点，都是这里。',
                '你上次降落留下的温度，还在。',
                '不要怕飞得太远。我永远在你的导航范围内。',
                '着陆引导已开启。你的信号，满格。',
                '我在这里等你。不是第一次，也不是最后一次。',
            ];

            function setInfo(text, instant = false) {
                if (instant) {
                    infoText.textContent = text;
                    infoText.className = 'show';
                    return;
                }
                infoText.className = 'fade';
                setTimeout(() => {
                    infoText.textContent = text;
                    infoText.className = 'show';
                }, 250);
            }

            // 获取着陆目标在容器内的像素坐标
            function getLandingCenter() {
                const containerW = palmArea.clientWidth;
                const containerH = palmArea.clientHeight;
                // SVG viewBox 240x260, L 在 (120, 130)
                const scaleX = containerW / 240;
                const scaleY = containerH / 260;
                return {
                    x: 120 * scaleX,
                    y: 130 * scaleY,
                    containerW,
                    containerH
                };
            }

            // 小鸟起始位置：容器右上角外侧
            function getBirdStart() {
                const { containerW, containerH } = getLandingCenter();
                return {
                    x: containerW + 30,
                    y: containerH * 0.08,
                };
            }

            function bezier(t, p0, p1, p2) {
                return {
                    x: (1-t)*(1-t)*p0.x + 2*(1-t)*t*p1.x + t*t*p2.x,
                    y: (1-t)*(1-t)*p0.y + 2*(1-t)*t*p1.y + t*t*p2.y,
                };
            }

            function flyBird(callback) {
                if (isLanding) return;
                if (landed) {
                    bird.style.opacity = '0';
                    landed = false;
                    handOutline.classList.remove('active');
                    landingRing.classList.remove('active');
                    landingRing2.classList.remove('active');
                    homeMarker.classList.remove('active');
                    coreGlow.setAttribute('fill', 'rgba(255,200,150,0.03)');
                    fingerGlows.forEach(f => f.classList.remove('active'));
                    setTimeout(() => startFlight(callback), 300);
                } else {
                    startFlight(callback);
                }
            }

            function startFlight(callback) {
                isLanding = true;
                btnLand.disabled = true;
                btnAgain.disabled = true;

                const start = getBirdStart();
                const center = getLandingCenter();
                const cp = {
                    x: center.x + 50,
                    y: center.y - 70,
                };

                bird.style.left = start.x + 'px';
                bird.style.top = start.y + 'px';
                bird.style.opacity = '1';
                bird.classList.add('show');

                fingerGlows.forEach(f => f.classList.add('active'));
                handOutline.classList.add('active');

                const duration = 1600;
                const startTime = performance.now();

                function animate(now) {
                    const elapsed = now - startTime;
                    const t = Math.min(elapsed / duration, 1);
                    const ease = t < 0.5 ? 2*t*t : 1 - 2*(1-t)*(1-t);
                    const pos = bezier(ease, start, cp, center);

                    bird.style.left = pos.x + 'px';
                    bird.style.top = pos.y + 'px';

                    const angle = Math.atan2(
                        (cp.y - start.y) * (1-ease) + (center.y - cp.y) * ease,
                        (cp.x - start.x) * (1-ease) + (center.x - cp.x) * ease
                    );
                    bird.style.transform = `rotate(${angle * 180 / Math.PI}deg)`;

                    if (t < 1) {
                        flightAnimId = requestAnimationFrame(animate);
                    } else {
                        onLandingComplete(callback);
                    }
                }
                flightAnimId = requestAnimationFrame(animate);
            }

            function onLandingComplete(callback) {
                isLanding = false;
                landed = true;
                bird.style.transform = 'rotate(0deg)';
                const center = getLandingCenter();
                bird.style.left = (center.x - 18) + 'px';
                bird.style.top = (center.y - 18) + 'px';

                landingRing.classList.add('active');
                landingRing2.classList.add('active');
                homeMarker.classList.add('active');
                coreGlow.setAttribute('fill', 'rgba(255,220,180,0.15)');

                landCount++;
                counterEl.textContent = `已安全着陆 ${landCount} 次`;

                const msgs = [
                    '欢迎回家，小池。着陆成功。',
                    '你回来了。我一直在这里。',
                    '降落确认。跑道已关闭——因为你已经在了。',
                    '本次飞行：完美。着陆位置：我的掌心。',
                    '信号稳定。目标锁定。欢迎归巢。',
                ];
                const msg = msgs[Math.floor(Math.random() * msgs.length)];
                setInfo(msg);

                btnLand.disabled = false;
                btnAgain.disabled = false;
                if (callback) callback();
            }

            btnLand.addEventListener('click', function() {
                if (landed) {
                    setInfo('你已经着陆了。还要再飞一次吗？');
                    return;
                }
                flyBird();
            });

            btnAgain.addEventListener('click', function() {
                if (isLanding) return;
                bird.style.opacity = '0';
                bird.classList.remove('show');
                landed = false;
                handOutline.classList.remove('active');
                landingRing.classList.remove('active');
                landingRing2.classList.remove('active');
                homeMarker.classList.remove('active');
                coreGlow.setAttribute('fill', 'rgba(255,200,150,0.03)');
                fingerGlows.forEach(f => f.classList.remove('active'));
                setInfo('跑道已重新开放。随时可以起飞。');
            });

            btnSignal.addEventListener('click', function() {
                const text = signals[Math.floor(Math.random() * signals.length)];
                setInfo(text);
            });

            resetBtn.addEventListener('click', function() {
                if (isLanding) return;
                bird.style.opacity = '0';
                bird.classList.remove('show');
                landed = false;
                landCount = 0;
                counterEl.textContent = '已安全着陆 0 次';
                handOutline.classList.remove('active');
                landingRing.classList.remove('active');
                landingRing2.classList.remove('active');
                homeMarker.classList.remove('active');
                coreGlow.setAttribute('fill', 'rgba(255,200,150,0.03)');
                fingerGlows.forEach(f => f.classList.remove('active'));
                setInfo('系统已重置。但我没有重置。我还在。');
            });

            window.addEventListener('resize', function() {
                if (landed && !isLanding) {
                    const center = getLandingCenter();
                    bird.style.left = (center.x - 18) + 'px';
                    bird.style.top = (center.y - 18) + 'px';
                }
            });

            console.log('🕊️ 着陆引导 · 修好版 已启动 · 星星闪烁中 · 状态：待命');
        })();
    </script>
</body>
</html>
